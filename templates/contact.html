{% extends "base.html" %}
{% block content %}

<section class="pt-28 md:pt-32 pb-16 md:pb-24">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <!-- Header -->
        <div class="text-center mb-10 md:mb-16 reveal">
            <span class="section-subtitle mb-3 md:mb-4 inline-block text-xs md:text-sm">
                <i class="fas fa-paper-plane mr-2"></i>{{ t.contact_subtitle }}
            </span>
            <h1 class="text-3xl sm:text-4xl md:text-5xl font-extrabold text-surface-900 mb-3 md:mb-4">{{ t.contact_title }}</h1>
            <p class="text-base md:text-lg text-surface-400 max-w-xl mx-auto">{{ t.contact_desc }}</p>
        </div>

        <div class="grid lg:grid-cols-5 gap-8 md:gap-10 max-w-5xl mx-auto">
            <!-- Contact Form -->
            <div class="lg:col-span-3">
                <div class="bg-white rounded-3xl shadow-sm border border-surface-100 p-6 md:p-10 card-hover card-border reveal">
                    <form method="POST" action="/contact" id="contactForm">
                        <div class="grid sm:grid-cols-2 gap-4 md:gap-6 mb-4 md:mb-6">
                            <div class="group">
                                <label class="block text-sm font-semibold text-surface-700 mb-2">{{ t.contact_form_name }}</label>
                                <input type="text" name="name" required 
                                    class="w-full px-4 py-3.5 bg-surface-50 border border-surface-200 rounded-2xl text-surface-800 placeholder:text-surface-400 focus:outline-none focus:ring-2 focus:ring-agri-400 focus:border-transparent transition-all duration-200 text-sm hover:border-agri-300"
                                    placeholder="{{ t.contact_form_name }}">
                            </div>
                            <div class="group">
                                <label class="block text-sm font-semibold text-surface-700 mb-2">{{ t.contact_form_email }}</label>
                                <input type="email" name="email" required 
                                    class="w-full px-4 py-3.5 bg-surface-50 border border-surface-200 rounded-2xl text-surface-800 placeholder:text-surface-400 focus:outline-none focus:ring-2 focus:ring-agri-400 focus:border-transparent transition-all duration-200 text-sm hover:border-agri-300"
                                    placeholder="{{ t.contact_form_email }}">
                            </div>
                        </div>
                        <div class="mb-4 md:mb-6">
                            <label class="block text-sm font-semibold text-surface-700 mb-2">{{ t.contact_form_subject }}</label>
                            <input type="text" name="subject" required 
                                class="w-full px-4 py-3.5 bg-surface-50 border border-surface-200 rounded-2xl text-surface-800 placeholder:text-surface-400 focus:outline-none focus:ring-2 focus:ring-agri-400 focus:border-transparent transition-all duration-200 text-sm hover:border-agri-300"
                                placeholder="{{ t.contact_form_subject }}">
                        </div>
                        <div class="mb-6 md:mb-8">
                            <label class="block text-sm font-semibold text-surface-700 mb-2">{{ t.contact_form_message }}</label>
                            <textarea name="message" rows="5" required 
                                class="w-full px-4 py-3.5 bg-surface-50 border border-surface-200 rounded-2xl text-surface-800 placeholder:text-surface-400 focus:outline-none focus:ring-2 focus:ring-agri-400 focus:border-transparent transition-all duration-200 text-sm resize-none hover:border-agri-300"
                                placeholder="{{ t.contact_form_message }}"></textarea>
                        </div>
                        <button type="submit" 
                            class="btn-primary w-full px-8 py-4 bg-agri-500 text-white rounded-2xl font-bold shadow-lg hover:shadow-xl text-sm md:text-base">
                            <i class="fas fa-paper-plane mr-2"></i>
                            {{ t.contact_form_send }}
                        </button>
                    </form>
                </div>
            </div>

            <!-- Contact Info -->
            <div class="lg:col-span-2">
                <div class="bg-white rounded-3xl shadow-sm border border-surface-100 p-6 md:p-10 card-hover reveal-left sticky top-28">
                    <div class="flex items-center gap-3 mb-6 md:mb-8">
                        <div class="w-10 h-10 md:w-12 md:h-12 bg-agri-100 rounded-2xl flex items-center justify-center">
                            <i class="fas fa-info-circle text-lg md:text-xl text-agri-600"></i>
                        </div>
                        <h2 class="text-lg md:text-xl font-bold text-surface-800">{{ t.contact_info }}</h2>
                    </div>
                    <div class="space-y-4 md:space-y-6">
                        <div class="flex items-start p-4 bg-surface-50 rounded-2xl hover:bg-agri-50 transition-all duration-300 group">
                            <div class="w-10 h-10 bg-agri-100 rounded-xl flex items-center justify-center flex-shrink-0 group-hover:scale-110 transition-transform">
                                <i class="fas fa-envelope text-agri-600"></i>
                            </div>
                            <div class="ml-4">
                                <p class="text-xs font-medium text-surface-400 uppercase tracking-wider">Email</p>
                                <a href="mailto:gustaramuhammad@gmail.com" class="text-sm font-semibold text-surface-800 hover:text-agri-600 transition-colors">gustaramuhammad@gmail.com</a>
                            </div>
                        </div>
                        <div class="flex items-start p-4 bg-surface-50 rounded-2xl hover:bg-agri-50 transition-all duration-300 group">
                            <div class="w-10 h-10 bg-agri-100 rounded-xl flex items-center justify-center flex-shrink-0 group-hover:scale-110 transition-transform">
                                <i class="fas fa-phone text-agri-600"></i>
                            </div>
                            <div class="ml-4">
                                <p class="text-xs font-medium text-surface-400 uppercase tracking-wider">Phone</p>
                                <a href="tel:+6281210374785" class="text-sm font-semibold text-surface-800 hover:text-agri-600 transition-colors">+62 812 1037 4785</a>
                            </div>
                        </div>
                        <div class="flex items-start p-4 bg-surface-50 rounded-2xl hover:bg-agri-50 transition-all duration-300 group">
                            <div class="w-10 h-10 bg-agri-100 rounded-xl flex items-center justify-center flex-shrink-0 group-hover:scale-110 transition-transform">
                                <i class="fab fa-linkedin-in text-agri-600"></i>
                            </div>
                            <div class="ml-4">
                                <p class="text-xs font-medium text-surface-400 uppercase tracking-wider">LinkedIn</p>
                                <a href="https://www.linkedin.com/in/muhammadgustara" target="_blank" class="text-sm font-semibold text-surface-800 hover:text-agri-600 transition-colors">Muhammad Gustara</a>
                            </div>
                        </div>
                        <div class="flex items-start p-4 bg-surface-50 rounded-2xl hover:bg-agri-50 transition-all duration-300 group">
                            <div class="w-10 h-10 bg-agri-100 rounded-xl flex items-center justify-center flex-shrink-0 group-hover:scale-110 transition-transform">
                                <i class="fas fa-map-marker-alt text-agri-600"></i>
                            </div>
                            <div class="ml-4">
                                <p class="text-xs font-medium text-surface-400 uppercase tracking-wider">Location</p>
                                <p class="text-sm font-semibold text-surface-800">Bogor, Indonesia</p>
                            </div>
                        </div>
                    </div>

                    <!-- Quick response -->
                    <div class="mt-6 p-4 bg-gradient-to-br from-agri-50 to-agri-100 rounded-2xl">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 bg-agri-200 rounded-full flex items-center justify-center flex-shrink-0">
                                <i class="fas fa-clock text-agri-600 text-sm"></i>
                            </div>
                            <p class="text-xs text-agri-700 font-medium">{{ t.contact_form_sending }}</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
